# ============================================================
# DonorMatch — Docker Compose (Full Stack)
# ============================================================
version: "3.9"

services:

  # ── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: donormatch_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-donormatch}
      POSTGRES_USER: ${POSTGRES_USER:-donormatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-donormatch_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-donormatch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery broker + cache) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: donormatch_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django Web App ───────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: donormatch_web
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=donormatch.settings
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-please}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - DATABASE_URL=postgres://${POSTGRES_USER:-donormatch}:${POSTGRES_PASSWORD:-donormatch_secret}@db:5432/${POSTGRES_DB:-donormatch}
      - REDIS_URL=redis://redis:6379/0
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://your-n8n-instance.com/webhook}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - BASE_URL=${BASE_URL:-http://localhost:8000}
    volumes:
      - media_files:/app/media
      - ml_models:/app/ml_models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Celery Worker (ML background tasks) ─────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: donormatch_celery
    restart: unless-stopped
    command: celery -A donormatch worker --loglevel=info --concurrency=2
    environment:
      - DJANGO_SETTINGS_MODULE=donormatch.settings
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-please}
      - DATABASE_URL=postgres://${POSTGRES_USER:-donormatch}:${POSTGRES_PASSWORD:-donormatch_secret}@db:5432/${POSTGRES_DB:-donormatch}
      - REDIS_URL=redis://redis:6379/0
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://your-n8n-instance.com/webhook}
      - N8N_API_KEY=${N8N_API_KEY:-}
    volumes:
      - ml_models:/app/ml_models
    depends_on:
      - web
      - redis

  # ── Celery Beat (Periodic ML training tasks) ─────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: donormatch_beat
    restart: unless-stopped
    command: celery -A donormatch beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=donormatch.settings
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-please}
      - DATABASE_URL=postgres://${POSTGRES_USER:-donormatch}:${POSTGRES_PASSWORD:-donormatch_secret}@db:5432/${POSTGRES_DB:-donormatch}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - celery

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: donormatch_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_files:/app/media:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  media_files:
  ml_models:
  static_files:

networks:
  default:
    name: donormatch_network
